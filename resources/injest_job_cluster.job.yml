# A sample job for databricks_job_market_mvp.

resources:
  jobs:
    ingest_job_cluster:
      name: ingest_job_cluster

      tasks:
        - task_key: ingest
          job_cluster_key: job_cluster
          spark_python_task:
            python_file: ../src/ingest_adzuna.py
            parameters:
              - --bronze-table
              - jobmarket.bronze.adzuna_jobs_raw

      job_clusters:
        - job_cluster_key: job_cluster
          new_cluster:
            spark_version: 16.4.x-scala2.12
            node_type_id: Standard_D4ds_v4
            num_workers: 0
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode
